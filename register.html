<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.5.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.5.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.5.0/firebase-auth.js"></script>
    <title>CenData - Census Made Easy</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <header>
        <img src="images/CenData.png" alt="" height="100px" width="100px" align="left"
                style="border-radius: 500px;">
        <h1>CenData</h1>
        <h2>Census Made Easy</h2>
    </header>

    <form id="censusForm" onsubmit="submitForm()">
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName" required>

        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" name="lastName" required>

        <label for="otherNames">Other Names:</label>
        <input type="text" id="otherNames" name="otherNames" required>

        <label for="gender">Gender:</label>
        <select id="gender" name="gender" required>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required pattern="\d+">

        <label for="address">Address:</label>
        <textarea id="address" name="address" rows="4" style="max-height: 100px; max-width: 600px" required></textarea>

        <label for="rsdstate">State (Residential):</label>
        <select id="rsdstate" name="rsdstate" onchange="updateRsdLocalGov()" required>
            <option value="abia">Abia</option>
            <option value="adamawa">Adamawa</option>
            <option value="akwa ibom">Akwa Ibom</option>
            <option value="anambra">Anambra</option>
            <option value="bauchi">Bauchi</option>
            <option value="bayelsa">Bayelsa</option>
            <option value="benue">Benue</option>
            <option value="borno">Borno</option>
            <option value="cross river">Cross River</option>
            <option value="delta">Delta</option>
            <option value="ebonyi">Ebonyi</option>
            <option value="enugu">Enugu</option>
            <option value="gombe">Gombe</option>
            <option value="imo">Imo</option>
            <option value="jigawa">Jigawa</option>
            <option value="kaduna">Kaduna</option>
            <option value="kano">Kano</option>
            <option value="katsina">Katsina</option>
            <option value="kebbi">Kebbi</option>
            <option value="kogi">Kogi</option>
            <option value="kwara">Kwara</option>
            <option value="lagos">Lagos</option>
            <option value="nasarawa">Nasarawa</option>
            <option value="niger">Niger</option>
            <option value="ogun">Ogun</option>
            <option value="ondo">Ondo</option>
            <option value="osun">Osun</option>
            <option value="oyo">Oyo</option>
            <option value="plateau">Plateau</option>
            <option value="rivers">Rivers</option>
            <option value="sokoto">Sokoto</option>
            <option value="taraba">Taraba</option>
            <option value="yobe">Yobe</option>
            <option value="zamfara">Zamfara</option>
            <option value="fct">FCT</option>
        </select>

        <label for="rsdLocalGov">Local Government (Residential):</label>
        <select id="rsdLocalGov" name="rsdLocalGov" required>
            <!-- Local government options will be added dynamically using JavaScript -->
        </select>

        <label for="bcert">Birth Certificate</label>
        <input type="file" id="bcert" name="bcert" required>

    <button type="submit" onclick="submitForm()">Submit</button>
    </form>

    <!-- Link to the separated JavaScript file -->
    <script src="register.js"></script>
